services:
  app:
    build:
      context: .
      dockerfile: Kinnect/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=kinnect;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      FileStorage__BasePath: /app/data
      ImageProcessing__AutoShrinkImages: "true"
      ImageProcessing__MaxWidth: "1920"
      ImageProcessing__MaxHeight: "1080"
      ImageProcessing__Quality: "80"
      ImageProcessing__ThumbnailWidth: "400"
      ImageProcessing__ThumbnailHeight: "400"
      ImageProcessing__ThumbnailQuality: "70"
      DocumentProcessing__AllowedExtensions: ".pdf,.jpg,.jpeg,.png,.gif,.webp"
      DocumentProcessing__MaxFileSizeBytes: "5242880"
      DocumentProcessing__AutoShrinkDocuments: "true"
      VideoProcessing__AutoShrinkVideos: "true"
      VideoProcessing__ToolsPath: /usr/bin
      VideoProcessing__MaxWidth: "1280"
      VideoProcessing__MaxHeight: "720"
      VideoProcessing__Crf: "28"
      VideoProcessing__AudioBitrate: "128000"
      # SeedAdmin__Email: admin@example.com
      # SeedAdmin__Password: "${ADMIN_PASSWORD}"
      # SeedAdmin__FirstName: Admin
      # SeedAdmin__LastName: User
      # ── Keycloak (optional) ──────────────────────────────────────────────────
      # Authentication__Provider: Keycloak
      # Authentication__Keycloak__Authority: http://host.docker.internal:8081/realms/home
      # Authentication__Keycloak__ClientId: kinnect
      # Authentication__Keycloak__ClientSecret: 
      # Authentication__Keycloak__PublicOrigin: "" (NAS/prod only)
      # Authentication__Keycloak__BackchannelBaseUrl: "" (NAS/prod only)
    volumes:
      - D:/_Docker/kinnect/uploads:/app/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kinnect
    volumes:
      - D:/_Docker/kinnect/pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

